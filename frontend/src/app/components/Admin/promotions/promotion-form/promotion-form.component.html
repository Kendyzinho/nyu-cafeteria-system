<div class="container page-section fade-up">

  <div class="page-header">
    <h2 class="page-title">Crear Promoción</h2>
    <p class="page-subtitle">
      Diseña campañas y descuentos activos para la cafetería.
    </p>
  </div>

  <div class="form-container">
    <form [formGroup]="promotionForm" (ngSubmit)="guardarPromocion()">

      <div *ngIf="successMessage" class="alert alert-success mb-4">
        {{ successMessage }}
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger mb-4">
        {{ errorMessage }}
      </div>

      <div class="form-group">
        <label>Nombre</label>
        <input type="text" class="form-control" formControlName="nombre">
      </div>

      <div class="form-group">
        <label>Descuento (%)</label>
        <input type="number" class="form-control" formControlName="descuento">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Fecha inicio</label>
          <input type="date" class="form-control" formControlName="fechaInicio">
        </div>

        <div class="form-group">
          <label>Fecha fin</label>
          <input type="date" class="form-control" formControlName="fechaFin">
        </div>
      </div>

      <div class="form-group checkbox-group">
        <input type="checkbox" id="activaPromo" formControlName="activa">
        <label for="activaPromo">Promoción activa</label>
      </div>

      <div class="form-group">
        <label>Descripción</label>
        <textarea class="form-control" rows="4" formControlName="descripcion"></textarea>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a routerLink="/promotions" class="btn-link">Volver</a>
      </div>

    </form>
  </div>

</div>
