<div class="container page-section fade-up">

  <div class="page-header">
    <h2 class="page-title">Crear Plan Alimentario</h2>
  </div>

  <div class="form-container">
    <form [formGroup]="mealPlanForm" (ngSubmit)="guardarPlan()">

      <div *ngIf="successMessage" class="alert alert-success mb-4">
        {{ successMessage }}
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger mb-4">
        {{ errorMessage }}
      </div>

      <div class="form-group">
        <label>Nombre</label>
        <input type="text" class="form-control" formControlName="nombre">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Tipo</label>
          <select class="form-control" formControlName="tipo" (change)="actualizarPrecioSegunTipo()">
            <option value="">Seleccionar tipo</option>
            <option value="BASICO">Básico</option>
            <option value="COMPLETO">Completo</option>
            <option value="PREMIUM">Premium</option>
          </select>
        </div>

        <div class="form-group">
          <label>Precio</label>
          <input type="number" class="form-control" formControlName="precio">
        </div>
      </div>

      <div class="form-group checkbox-group">
        <input type="checkbox" id="activoPlan" formControlName="activo">
        <label for="activoPlan">Plan activo</label>
      </div>

      <div class="form-group">
        <label>Descripción</label>
        <textarea class="form-control" rows="4" formControlName="descripcion"></textarea>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a routerLink="/meal-plans" class="btn-link">Volver</a>
      </div>

    </form>
  </div>

</div>
