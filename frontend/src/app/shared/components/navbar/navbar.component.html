<header>
  <div style="background-color: var(--nyu-dark); padding: 15px 0;">
    <div class="container d-flex justify-content-between align-items-center">
      
      <a routerLink="/home" class="text-white text-decoration-none d-flex align-items-center">
        <h1 class="fw-bold mb-0 me-3" style="letter-spacing: 1px; border-bottom: 3px solid white;">CAFETERIA NYU</h1>
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8h1a4 4 0 0 1 0 8h-1"></path>
          <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path>
          <line x1="6" y1="1" x2="6" y2="4"></line>
          <line x1="10" y1="1" x2="10" y2="4"></line>
          <line x1="14" y1="1" x2="14" y2="4"></line>
        </svg>
      </a>

      <div class="d-flex align-items-center text-white" *ngIf="currentUser">
        <div class="bg-white text-dark fw-bold d-flex justify-content-center align-items-center me-3" 
             style="width: 45px; height: 45px; border-radius: 8px; font-size: 1.2rem; cursor: pointer;"
             data-bs-toggle="dropdown">
          {{ initials }}
        </div>
        <div class="lh-sm">
          <div class="fw-bold">{{ currentUser.firstName }} {{ currentUser.lastName }}</div>
          <small class="text-light opacity-75">(Estudiante Activo, {{ currentUser.isResident ? 'Residente' : 'Regular' }})</small>
        </div>
        <div class="ms-3 rounded-circle bg-success" style="width: 15px; height: 15px;"></div>

        <ul class="dropdown-menu dropdown-menu-end shadow">
          <li><a class="dropdown-item" routerLink="/profile">Mi Perfil</a></li>
          <li *ngIf="currentUser.role === 'Administrador'"><a class="dropdown-item" routerLink="/admin/users">Gestión de Usuarios</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><button class="dropdown-item text-danger fw-bold" (click)="logout()">Cerrar Sesión</button></li>
        </ul>
      </div>

    </div>
  </div>

  <div style="background-color: var(--nyu-brown); padding: 15px 0;">
    <div class="container d-flex justify-content-between align-items-center">
      
      <div class="d-flex gap-3">
        <a routerLink="/home" routerLinkActive="bg-white text-dark" class="btn btn-outline-light bg-white text-dark fw-bold border-0" style="border-radius: 4px;">Inicio</a>
        <a routerLink="/menu" routerLinkActive="bg-white text-dark" class="btn btn-outline-light fw-bold border-0" style="border-radius: 4px;">Menu del dia</a>
        <a routerLink="/resident-plan" routerLinkActive="bg-white text-dark" class="btn btn-outline-light fw-bold border-0" style="border-radius: 4px;">Mi Plan</a>
        <a routerLink="/history" routerLinkActive="bg-white text-dark" class="btn btn-outline-light fw-bold border-0" style="border-radius: 4px;">Historial de Consumo</a>
        <a routerLink="/help" routerLinkActive="bg-white text-dark" class="btn btn-outline-light fw-bold border-0" style="border-radius: 4px;">Ayuda</a>
      </div>

      <a routerLink="/checkout" class="btn bg-dark text-white fw-bold d-flex align-items-center gap-2" style="border-radius: 4px;">
        <span class="fs-5">🛒</span> (3) Articulos
      </a>

    </div>
  </div>
</header>
