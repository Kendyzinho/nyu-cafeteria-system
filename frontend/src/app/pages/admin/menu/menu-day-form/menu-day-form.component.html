<div class="menu-form-container">
  <h2>Definir Menú del Día</h2>
  <form [formGroup]="menuForm" (ngSubmit)="onSubmit()">
    <!-- Date Selection -->
    <div class="form-group">
      <label for="menu-date">Fecha del Menú</label>
      <input type="date" id="menu-date" formControlName="date" class="form-control">
    </div>

    <!-- Product Search and Add -->
    <div class="form-group">
      <label for="product-search">Añadir Ítem al Menú</label>
      <input
        type="text"
        id="product-search"
        class="form-control"
        placeholder="Buscar producto para añadir..."
        [(ngModel)]="searchTerm"
        (input)="filterProducts()"
        [ngModelOptions]="{standalone: true}">
      <div class="product-list" *ngIf="searchTerm">
        <div *ngFor="let product of filteredProducts" (click)="addMenuItem(product)" class="product-item">
          {{ product.name }} - <small>{{ product.category }}</small>
        </div>
      </div>
    </div>

    <!-- Selected Menu Items -->
    <div class="selected-items">
      <h3>Ítems en el Menú para el {{ menuForm.get('date')?.value | date:'dd/MM/yyyy' }}</h3>
      <div formArrayName="menuItems">
        <div *ngFor="let item of menuItems.controls; let i = index" [formGroupName]="i" class="selected-item">
          <span>{{ item.get('name')?.value }} ({{ item.get('category')?.value }})</span>
          <button type="button" (click)="removeMenuItem(i)" class="btn-remove">&times;</button>
        </div>
        <p *ngIf="menuItems.length === 0" class="empty-message">Aún no has añadido ítems al menú.</p>
      </div>
    </div>

    <!-- Submit Button -->
    <button type="submit" [disabled]="!menuForm.valid || menuItems.length === 0" class="btn-submit">
      Guardar Menú
    </button>
  </form>
</div>
