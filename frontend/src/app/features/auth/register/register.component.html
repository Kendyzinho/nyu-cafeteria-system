<div class="login-container">
  <div class="login-card">
    <div class="text-center mb-4">
      <h2 class="nyu-title">Cafetería <span>NYU</span></h2>
      <p class="text-muted small">Crea tu cuenta de estudiante</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      
      <div class="row">
        <div class="col-6 form-group mb-3">
          <label class="fw-bold mb-1 small">Nombres</label>
          <input type="text" formControlName="firstName" class="form-control bg-light"
                 [ngClass]="{'is-invalid': registerForm.get('firstName')?.invalid && registerForm.get('firstName')?.touched}">
        </div>
        
        <div class="col-6 form-group mb-3">
          <label class="fw-bold mb-1 small">Apellidos</label>
          <input type="text" formControlName="lastName" class="form-control bg-light"
                 [ngClass]="{'is-invalid': registerForm.get('lastName')?.invalid && registerForm.get('lastName')?.touched}">
        </div>
      </div>

      <div class="form-group mb-3">
        <label class="fw-bold mb-1 small">Correo Universitario</label>
        <div class="input-wrapper">
          <span class="icon">✉️</span>
          <input type="email" formControlName="email" class="form-control ps-5" placeholder="usuario@nyu.edu"
                 [ngClass]="{'is-invalid': registerForm.get('email')?.invalid && registerForm.get('email')?.touched}">
        </div>
      </div>

      <div class="form-group mb-3">
        <label class="fw-bold mb-1 small">Contraseña</label>
        <div class="input-wrapper">
          <span class="icon">🔒</span>
          <input type="password" formControlName="password" class="form-control ps-5" placeholder="Mínimo 6 caracteres"
                 [ngClass]="{'is-invalid': registerForm.get('password')?.invalid && registerForm.get('password')?.touched}">
        </div>
      </div>

      <div class="form-group mb-4">
        <label class="fw-bold mb-1 small">Confirmar Contraseña</label>
        <div class="input-wrapper">
          <span class="icon">🔒</span>
          <input type="password" formControlName="confirmPassword" class="form-control ps-5" placeholder="Repite tu contraseña"
                 [ngClass]="{'is-invalid': registerForm.hasError('mismatch') && registerForm.get('confirmPassword')?.touched}">
        </div>
        <div class="text-danger small mt-1" *ngIf="registerForm.hasError('mismatch') && registerForm.get('confirmPassword')?.touched">
          Las contraseñas no coinciden.
        </div>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger small p-2 mb-3 text-center">{{ errorMessage }}</div>
      <div *ngIf="successMessage" class="alert alert-success small p-2 mb-3 text-center">{{ successMessage }}</div>

      <button type="submit" class="btn-cafeteria w-100" [disabled]="registerForm.invalid || isLoading">
        <span *ngIf="!isLoading">[ REGISTRARSE ]</span>
        <span *ngIf="isLoading">Creando cuenta...</span>
      </button>

    </form>

    <div class="text-center mt-4 border-top pt-3">
      <span class="text-muted small">¿Ya tienes cuenta?</span> 
      <a routerLink="/login" class="support-link small ms-1">Inicia Sesión aquí</a>
    </div>
  </div>
</div>
