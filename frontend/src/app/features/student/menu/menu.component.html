<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h2 class="fw-bold" style="color: #4E342E;">Menú del Día 🍽️</h2>
    <p class="text-muted">Explora nuestras opciones y arma tu pedido.</p>
  </div>
  
  <div class="d-flex gap-2">
    <select #filtroCategoria class="form-select w-auto select-cafeteria shadow-sm">
      <option value="todos">Todas las categorías</option>
      <option value="almuerzos">Almuerzos</option>
      <option value="ligeras">Opciones Ligeras</option>
      <option value="bebidas">Bebidas</option>
    </select>
    <button class="btn btn-outline-secondary btn-sm" (click)="resetFiltro()" title="Limpiar filtro">↺</button>
  </div>
</div>

<div class="row g-4">
  <div class="col-md-6 col-lg-4" *ngFor="let producto of menuItems">
    
    <app-menu-item 
      [item]="producto" 
      (add)="handleAddToCart($event)">
    </app-menu-item>

  </div>
</div>
