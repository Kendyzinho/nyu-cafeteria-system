<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h2 class="fw-bold" style="color: #4E342E;">Menú del Día 🍽️</h2>
    <p class="text-muted">Explora nuestras opciones y arma tu pedido.</p>
  </div>
  
  <select class="form-select w-auto select-cafeteria shadow-sm">
    <option value="todos">Todas las categorías</option>
    <option value="almuerzos">Almuerzos</option>
    <option value="ligeras">Opciones Ligeras</option>
    <option value="bebidas">Bebidas</option>
  </select>
</div>

<div class="row g-4">
  <div class="col-md-6 col-lg-4" *ngFor="let item of menuItems">
    <div class="card h-100 border-0 shadow-sm card-menu" [ngClass]="{'opacity-75': !item.isAvailable}">
      <img [src]="item.image" class="card-img-top img-menu" [alt]="item.name">
      
      <div *ngIf="!item.isAvailable" class="sold-out-badge">AGOTADO</div>

      <div class="card-body d-flex flex-column">
        <span class="badge bg-cafe-light w-auto mb-2 align-self-start">{{ item.category }}</span>
        <h5 class="fw-bold mb-1" style="color: #4E342E;">{{ item.name }}</h5>
        <p class="text-muted small mb-3 flex-grow-1">{{ item.description }}</p>
        
        <div class="d-flex justify-content-between align-items-end mb-3">
          <div>
            <div class="text-decoration-line-through text-muted small">Regular: ${{ item.price }}</div>
            <div class="fs-5 fw-bold" style="color: #6F4E37;">${{ item.studentPrice }} <span class="fs-6 text-muted fw-normal">(Estudiante)</span></div>
          </div>
        </div>

        <button 
          class="btn w-100 fw-bold" 
          [ngClass]="item.isAvailable ? 'btn-cafeteria' : 'btn-secondary'"
          [disabled]="!item.isAvailable"
          (click)="addToCart(item)">
          {{ item.isAvailable ? '+ Agregar a mi pedido' : 'Sin Stock' }}
        </button>
      </div>
    </div>
  </div>
</div>
