<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYU Cafeteria</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <h1>NYU Cafeteria System</h1>
  </header>
  <main>
    <nav class="tabs">
      <button class="tab-btn active" onclick="showTab('menu')">Menú del Día</button>
      <button class="tab-btn" onclick="showTab('order')">Hacer Pedido</button>
      <button class="tab-btn" onclick="showTab('my-orders')">Mis Pedidos</button>
      <button class="tab-btn" onclick="showTab('history')">Historial</button>
      <button class="tab-btn" onclick="showTab('plans')">Planes</button>
    </nav>

    <div id="tab-menu" class="tab active">
      <h2>Menú del Día</h2>
      <div class="filters">
        <label for="menu-date">Fecha:</label>
        <input type="date" id="menu-date" onchange="loadMenu()">
      </div>
      <div id="menu-grid" class="grid"></div>
    </div>

    <div id="tab-order" class="tab">
      <h2>Hacer un Pedido</h2>
      <form id="order-form" class="form-layout" style="max-width: 600px;">
        <div class="form-group">
          <label for="order-student-id">ID de Estudiante:</label>
          <input type="number" id="order-student-id" required>
        </div>
        <div class="form-group">
          <label for="order-pickup">Hora de Retiro:</label>
          <input type="datetime-local" id="order-pickup" required>
        </div>
        <h3>Ítems del Pedido</h3>
        <div id="order-items-list"></div>
        <button type="button" onclick="addOrderItem()">+ Agregar Ítem</button>
        <button type="submit">Enviar Pedido</button>
        <div id="order-result" class="result hidden"></div>
      </form>
    </div>

    <div id="tab-my-orders" class="tab">
      <h2>Mis Pedidos</h2>
      <div class="form-layout" style="max-width: 400px; margin-bottom: 1rem;">
        <div class="form-group">
          <label for="orders-student-id">ID de Estudiante:</label>
          <input type="number" id="orders-student-id">
        </div>
        <button type="button" onclick="loadStudentOrders()">Cargar Pedidos</button>
      </div>
      <div id="orders-list" class="table-container"></div>
    </div>

    <div id="tab-history" class="tab">
      <h2>Historial de Consumo</h2>
      <div class="form-layout" style="max-width: 400px; margin-bottom: 1rem;">
        <div class="form-group">
          <label for="history-student-id">ID de Estudiante:</label>
          <input type="number" id="history-student-id">
        </div>
        <button type="button" onclick="loadHistory()">Cargar Historial</button>
      </div>
      <div id="history-table" class="table-container"></div>
    </div>

    <div id="tab-plans" class="tab">
      <div class="plans-container">
        <div class="plans-list">
          <h2>Mis Planes</h2>
          <div class="form-layout" style="margin-bottom: 1rem;">
            <div class="form-group">
              <label for="plans-student-id">ID de Estudiante:</label>
              <input type="number" id="plans-student-id">
            </div>
            <button type="button" onclick="loadPlans()">Cargar Planes</button>
          </div>
          <div id="plans-result"></div>
        </div>
        <div class="plan-form-container">
          <h2>Contratar Plan</h2>
          <form id="plan-form" class="form-layout">
            <div class="form-group">
              <label for="plan-student-id">ID de Estudiante:</label>
              <input type="number" id="plan-student-id" required>
            </div>
            <div class="form-group">
              <label for="plan-type">Tipo de Plan:</label>
              <select id="plan-type">
                <option value="basic">Básico</option>
                <option value="premium">Premium</option>
                <option value="vegetarian">Vegetariano</option>
              </select>
            </div>
            <div class="form-group">
              <label for="plan-month">Mes:</label>
              <input type="number" id="plan-month" min="1" max="12" value="4" required>
            </div>
            <div class="form-group">
              <label for="plan-year">Año:</label>
              <input type="number" id="plan-year" min="2024" value="2026" required>
            </div>
            <button type="submit">Contratar</button>
            <div id="plan-form-result" class="result hidden"></div>
          </form>
        </div>
      </div>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
