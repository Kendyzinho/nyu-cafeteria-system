<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NYU Cafeteria System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>🍽️ NYU Cafeteria System</h1>
    <nav>
      <button class="tab-btn active" onclick="showTab('menu')">Menú del Día</button>
      <button class="tab-btn" onclick="showTab('order')">Hacer Pedido</button>
      <button class="tab-btn" onclick="showTab('history')">Mi Historial</button>
      <button class="tab-btn" onclick="showTab('plans')">Planes</button>
    </nav>
  </header>

  <main>
    <!-- TAB: MENÚ -->
    <section id="tab-menu" class="tab active">
      <div class="section-header">
        <h2>Menú del Día</h2>
        <input type="date" id="menu-date" />
        <button onclick="loadMenu()">Buscar</button>
      </div>
      <div id="menu-grid" class="grid"></div>
    </section>

    <!-- TAB: PEDIDO -->
    <section id="tab-order" class="tab">
      <h2>Nuevo Pedido</h2>
      <form id="order-form">
        <div class="form-group">
          <label>ID Estudiante</label>
          <input type="number" id="order-student-id" placeholder="Ej: 1" required />
        </div>
        <div class="form-group">
          <label>Hora de retiro</label>
          <input type="datetime-local" id="order-pickup" required />
        </div>
        <div class="form-group">
          <label>Ítems</label>
          <div id="order-items-list"></div>
          <button type="button" onclick="addOrderItem()">+ Agregar ítem</button>
        </div>
        <button type="submit" class="btn-primary">Confirmar Pedido</button>
      </form>
      <div id="order-result" class="result-box hidden"></div>

      <hr />
      <h3>Pedidos del estudiante</h3>
      <div class="form-group">
        <input type="number" id="orders-student-id" placeholder="ID Estudiante" />
        <button onclick="loadStudentOrders()">Ver Pedidos</button>
      </div>
      <div id="orders-list"></div>
    </section>

    <!-- TAB: HISTORIAL -->
    <section id="tab-history" class="tab">
      <h2>Historial de Consumo</h2>
      <div class="form-group">
        <input type="number" id="history-student-id" placeholder="ID Estudiante" />
        <button onclick="loadHistory()">Ver Historial</button>
      </div>
      <div id="history-table"></div>
    </section>

    <!-- TAB: PLANES -->
    <section id="tab-plans" class="tab">
      <h2>Planes Alimentarios</h2>
      <div class="form-group">
        <input type="number" id="plans-student-id" placeholder="ID Estudiante" />
        <button onclick="loadPlans()">Ver Planes</button>
      </div>
      <div id="plans-result"></div>

      <hr />
      <h3>Contratar Plan</h3>
      <form id="plan-form">
        <div class="form-group">
          <label>ID Estudiante (debe tener residencia activa)</label>
          <input type="number" id="plan-student-id" required />
        </div>
        <div class="form-group">
          <label>Tipo de Plan</label>
          <select id="plan-type">
            <option value="basic">Básico — $80 (1 crédito/día)</option>
            <option value="standard">Estándar — $120 (2 créditos/día)</option>
            <option value="premium">Premium — $160 (3 créditos/día)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Mes</label>
          <input type="number" id="plan-month" min="1" max="12" placeholder="4" required />
        </div>
        <div class="form-group">
          <label>Año</label>
          <input type="number" id="plan-year" value="2026" required />
        </div>
        <button type="submit" class="btn-primary">Contratar Plan</button>
      </form>
      <div id="plan-result" class="result-box hidden"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
